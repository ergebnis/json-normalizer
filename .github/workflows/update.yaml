# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Update"

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 9 * * *"

permissions: {}

jobs:
  schema:
    name: "Schema"

    runs-on: "ubuntu-latest"

    strategy:
      matrix:
        php-version:
          - "7.4"

        dependencies:
          - "locked"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # 2.37.1
        with:
          coverage: "none"
          php-version: "${{ matrix.php-version }}"

      - name: "Download schema"
        run: "wget --output-document=test/Fixture/Vendor/Composer/schema.json https://getcomposer.org/schema.json"

      - name: "Show diff"
        run: "git diff test/Fixture/Vendor/Composer/schema.json"

      - name: "Determine composer root version"
        uses: "ergebnis/.github/actions/composer/determine-root-version@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-"

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0
        with:
          dependencies: "${{ matrix.dependencies }}"

      - name: "Laxify schema"
        run: "php bin/laxify-schema.php"

      - name: "Open pull request updating schema"
        uses: "gr2m/create-or-update-pull-request-action@86ec1766034c8173518f61d2075cc2a173fb8c97" # v1.9.4
        with:
          author: "ergebnis-bot <bot@ergebn.is>"
          branch: "feature/schema"
          body: |
            This PR

            - [x] updates `schema.json`
          commit-message: "Enhancement: Update schema.json"
          path: "test/Fixture/Vendor/Composer/"
          title: "Enhancement: Update `schema.json`"
        env:
          GITHUB_TOKEN: "${{ secrets.ERGEBNIS_BOT_TOKEN }}"
